<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DevBank</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="overlay"></div>

  <div class="container">
    <h1>🏦 DevBank</h1>

    <p id="saldo">
      Saldo: <span id="valorSaldo">R$ 0</span>
    </p>

    <div class="buttons">
      <button id="depositar" class="btn">Depositar</button>
      <button id="sacar" class="btn">Sacar</button>
      <button id="extratoBtn" class="btn">Extrato</button>
      <button id="sair" class="btn">Sair</button>
    </div>

    <div id="areaExtrato" class="hidden">
      <h2>📄 Extrato</h2>
      <ul id="listaExtrato"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
