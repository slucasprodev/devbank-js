<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevBank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOGIN -->
  <div class="container" id="loginBox">
    <h2>🔐 Login</h2>
    <input id="usuario" placeholder="Enter your username" />
    <button id="entrar" style="padding:8px 12px; font-size:12px;">Enter</button>
  </div>

  <!-- APP -->
  <div class="container" id="app" style="display:none;">
    <h1>🏦 DevBank</h1>

    <p class="label">
      Balance: <span id="valorSaldo">R$ 0</span>
    </p>

    <div class="buttons">
      <button id="depositar">Deposit</button>
      <button id="sacar">Withdraw</button>
      <button id="extratoBtn">Statement</button>
      <button id="sair">Logout</button>
      <button id="transferirBtn">Transfer</button>
    </div>

    <h3 class="label">Statement</h3>
    <ul id="listaExtrato"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
